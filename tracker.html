<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <!-- link css -->
     <link rel="stylesheet" href="tracker.css">

     <!-- font awesom cdn link -->
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" integrity="sha512-Kc323vGBEqzTmouAECnVceyQqyqdsSiqLQISBL29aUW4U/M7pSPA/gEUZQqv1cwx4OnYxTxve5UMg5GT6L4JJg==" crossorigin="anonymous" referrerpolicy="no-referrer" />

     <!-- google font link -->
     <link rel="preconnect" href="https://fonts.googleapis.com">
     <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
     <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
</head>


<body>

    <!-- home screen -->
<div class="container">

  <!-------------------------------------------------------- Left Sidebar ---------------------------------->
  <div class="aside"  id="blur1">

      <!-- Profile Image -->
      <div class="image">
          <img src="images/ui.jpg" alt="Profile Image">
      </div>

      <!-- User Name -->
      <div class="name">
          <p>Janice Chandler</p>
      </div>

      <!-- Navbar Toggle Button -->
      <div class="nav-toggler">
          <span></span>
      </div>

      <!-- Navigation Menu -->
      <ul class="nav">
          <li><a href="#" class="active" onclick="setActiveLink('Home')"><i class="fa-solid fa-house"></i> Home</a></li>
           <li><a href="#" onclick="togglePopup('Add Expense')"><i class="fa-solid fa-square-plus"></i> Add Expense</a></li> 
         

          <li><a href="#" onclick="setActiveLink('Log Out')"><i class="fa-solid fa-arrow-right-from-bracket"></i> Log Out</a></li>
      </ul>

  </div>
  <!-- End of Left Sidebar -->

  <!-----------Main Content ----------------> 
  <div class="main-content" id="blur">
      <section class="home section">
          <div class="cont">
              <div class="row">
                  
                  <!-- Reports Button -->
                  <div class="report">
                      <button><a href="#"><i class="fa-solid fa-chart-simple" style="color: #fcfdfd;"></i> Reports</a></button>
                  </div>

                  <!-- Financial Summary Headings -->
                  <div class="head">
                      <h3 style="color: green;">Income</h3>
                      <h3 style="color: red;">Expense</h3>
                      <h3 style="color: rgb(0%,62.4%,76.1%);">Total</h3>
                  </div>

                  <!-- Financial Summary Cards -->
                  <div class="card-boxes">
                      <div class="card" style="border: 3px solid green; box-shadow: 0 4px 8px rgba(6, 105, 21, 0.1);">
                          <h4 style="font-weight: 400; color: green;">10000.00</h4>
                      </div>
                      <div class="card" style="border: 3px solid red; box-shadow: 0 4px 8px rgba(180, 16, 16, 0.1);">
                          <h4 style="font-weight: 400; color: red;">9000.00</h4>
                      </div>
                      <div class="card" style="border: 3px solid rgb(0%,62.4%,76.1%); box-shadow: 0 4px 8px rgba(48, 191, 239, 0.1);">
                          <h4 style="font-weight: 400; color: rgb(0%,62.4%,76.1%);">1000.00</h4>
                      </div>
                  </div>

                  <!-- Recent Expenses Section -->
                  <div class="recent">
                      <h3>Recent Expenses</h3>
                      <hr>
                  </div>

                  <!-- Expenses Details List -->
                  <div class="details">
                      <div class="amount">
                          <!-- Sample Transaction -->
                          <div class="detail1">
                              <a href="#"><i class="fa-solid fa-landmark" style="color: #2f9335;"></i></a>
                              <div class="head1">
                                  <h4 class="det-head">Salary Credited</h4>
                                  <p class="det-p">Salary credit from the com...</p>
                              </div>
                              <div class="cash">
                                  <h4 class="det-head">$5300</h4>
                                  <p class="det-p">12/10/24</p>
                              </div>
                          </div>
                          <!-- Additional transactions as needed -->
                      </div>
                  </div>
              </div>
          </div>
      </section>
  </div>
  <!-- End of Main Content -->

  <!------------------------------------------------------ Popup Form ---------------------------------------------------->
  <div class="popup" id="popup">
      <div class="form">
          <h2>Add Expense</h2>
          <!-- <div id="formMessage" class="form-message" style="display: none; color: green;"></div> -->

          <div id="formMessage"></div>


          <!-- Date Selection -->
          <div class="form-element">
              <label>
                  <input type="radio" name="date" value="current" checked onchange="toggleDateInput()"> Current Date
              </label>
              <label>
                  <input type="radio" name="date" value="custom" onchange="toggleDateInput()"> Custom Date
              </label>
          </div>

          <!-- Display Selected Date -->
          <div id="currentDateDisplay" style="margin-bottom: 10px;"></div>

          <!-- Custom Date Input -->
          <input type="date" id="customDate" style="display: none;" onchange="updateDisplayedDate()">

          <!-- Income or Expense Selection -->
          <div class="cate">
              <a href="#" class="btn1 btn-active-income" id="incomeBtn" onclick="showIncome(); return false;">Income</a>
              <a href="#" class="btn2 btn-inactive" id="expenseBtn" onclick="showExpense(); return false;">Expense</a>
          </div>

          <!-- Amount Input -->
          <div class="form-element">
              <input type="number" id="amount" placeholder="Enter Amount" required>
          </div>

          <!-- Category Selection -->
          <div class="form-element">
              <select name="category" id="incomes">
                  <option value="" hidden>Select Income Type</option>
                  <option value="salary">Salary</option>
                  <option value="roomRent">Room Rent</option>
                  <option value="profit">Profit</option>
              </select>
              <select name="category" id="expenses" style="display: none;">
                  <option value="" hidden>Select Expense Type</option>
                  <option value="food">Food</option>
                  <option value="grocery">Grocery</option>
                  <option value="loan">Loan</option>
                  <option value="electricity">Electricity</option>
              </select>
          </div>

          <!-- Description Input -->
          <div class="form-element">
              <textarea id="description" placeholder="Enter something here..."></textarea>
          </div>

          <!-- Submit and Cancel Buttons -->
          <div class="form-element" id="submit">
              <!-- <button class="sub" onclick="submitForm(); return false;">Submit</button> -->

              <button class="sub" id="submitBtn" onclick="submitForm(); return false;">Submit</button>

              <button class="cancel" onclick="togglePopup(); return false;">Cancel</button>
          </div>
      </div>
  </div>
</div>


    </div>
    
</body>

<!-- link javascript file -->
 <script src="script5.js"></script>
</html>
